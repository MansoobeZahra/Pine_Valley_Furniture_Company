<!DOCTYPE html>
<html>

<head>
    <title>Order Placement - Pine Valley Furniture</title>
</head>

<body>
    <h1>Product Selection &amp; Order Placement</h1>
    <p><a href="index.html">Back to Main Menu</a></p>
    <hr>
    <form>
        <h2>Customer Information</h2>
        <table>
            <tr>
                <td>Customer ID:</td>
                <td><input type="text" name="customer_id"></td>
            </tr>
        </table>

        <h2>Order Details</h2>
        <table>
            <tr>
                <td>Order ID:</td>
                <td><input type="text" name="order_id"></td>
            </tr>
            <tr>
                <td>Order Date:</td>
                <td><input type="date" name="order_date"></td>
            </tr>
        </table>

        <h2>Order Lines</h2>
        <table border="1">
            <tr>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Quantity</th>
                <th>Unit Price</th>
            </tr>
            <tr>
                <td><input type="text" name="product_id_1" size="10"></td>
                <td><input type="text" name="product_name_1" size="20"></td>
                <td><input type="number" name="quantity_1" size="5"></td>
                <td><input type="text" name="unit_price_1" size="10"></td>
            </tr>
            <tr>
                <td><input type="text" name="product_id_2" size="10"></td>
                <td><input type="text" name="product_name_2" size="20"></td>
                <td><input type="number" name="quantity_2" size="5"></td>
                <td><input type="text" name="unit_price_2" size="10"></td>
            </tr>
            <tr>
                <td><input type="text" name="product_id_3" size="10"></td>
                <td><input type="text" name="product_name_3" size="20"></td>
                <td><input type="number" name="quantity_3" size="5"></td>
                <td><input type="text" name="unit_price_3" size="10"></td>
            </tr>
        </table>
        <br>
        <input type="submit" value="Place Order">
        <input type="reset" value="Clear">
    </form>
    <hr>
    <p><a href="payment.html">Proceed to Payment</a> | <a href="search.html">Search Products</a> | <a
            href="help.html">Help</a></p>
</body>

</html>
